<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Cinema</title>
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilo/cinema.css">
</head>
<body>
    <main>
        <section id="tela-cinema">

        </section>

        <section class="genero-shonen">
            <h2 class="shonen">Shonen</h2>
            <div class="cima">
                <a href="#"><img src="imagens/icones/ichigo.jpeg" alt="Bleach"></a>
                <a href="#"><img src="imagens/icones/naruto.jpg" alt="Naruto"></a>
                <a href="#"><img src="imagens/icones/goku.jpeg" alt="Dragon Ball"></a>
            </div>
        </section>

        <section class="genero-isekai">
            <h2 class="isekai">Isekai</h2>
            <div class="baixo">
                <a href="#"><img src="imagens/icones/rimuru.jpeg" alt="Tensei Shittara Slime"></a>
                <a href="#"><img src="imagens/icones/subaru.jpeg" alt="Re-Zero"></a>
                <a href="#"><img src="imagens/icones/naofumi.jpeg" alt="Tate No Yuusha"></a>
            </div>
        </section>

        <section class="genero-romance">
            <h2 class="romance">Romance</h2>
            <div class="esquerda">
                <a href="#"><img src="imagens/icones/kousei-arima.jpeg" alt="Your Lie in April"></a> <br>
                <a href="#"><img src="imagens/icones/uzaki.jpeg" alt="Uzaki-chan Wants to Hang Out!"></a> <br>
                <a href="#"><img src="imagens/icones/kaguya-sama.jpg" alt="Kaguya-sama: Love is War"></a>
            </div>
        </section>

        <section class="genero-terror">
            <h2 class="terror">Terror</h2>
            <div class="direita">
                <a href="#"><img src="imagens/icones/kouichi.jpeg" alt="Another"></a>
                <a href="#"><img src="imagens/icones/kaneki.jpeg" alt="Tokyo Ghoul"></a>
                <a href="#"><img src="imagens/icones/Emma.jpeg" alt="The Promised Neverland"></a>
            </div>
        </section>
    </main>
</body>
</html>
